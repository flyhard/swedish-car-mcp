version: 2

project_name: swedish-car-mcp

builds:
  - id: aviloo-mcp
    main: ./cmd/aviloo-mcp
    binary: aviloo-mcp
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
  - id: bilmarknad-mcp
    main: ./cmd/bilmarknad-mcp
    binary: bilmarknad-mcp
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    # Must match scm_archive_name() in scripts/lib/common.sh
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
